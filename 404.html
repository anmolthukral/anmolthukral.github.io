<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Page Not Found - Engineer Playbook">
    <meta name="author" content="Engineer Playbook">

    <title>404 - Page Not Found | Engineer Playbook</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Oat UI -->
    <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
    <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>

    <!-- Custom Styles -->
    <link href="/css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/img/logo.svg">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Navigation -->
    <link rel="stylesheet" href="https://megamind-nav.vercel.app/common-nav.css">
    <script type="module" crossorigin="anonymous" src="https://megamind-nav.vercel.app/common-nav.js"></script>
    <engineering-playbook-nav></engineering-playbook-nav>

    <!-- 404 Section -->
    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 120px 20px 40px; text-align: center;">
        <div class="container" style="max-width: 600px;">
            <!-- Glitch / Stylish 404 Text -->
            <h1 style="font-size: clamp(6rem, 15vw, 10rem); font-family: 'Outfit', sans-serif; font-weight: 800; line-height: 1; margin: 0; background: linear-gradient(135deg, var(--accent-color) 0%, #2a52be 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 10px 30px rgba(0, 85, 255, 0.2); position: relative; display: inline-block;">
                404
            </h1>
            
            <h2 style="font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 700; color: var(--text-primary); margin: 1.5rem 0 1rem;">
                Oops! Looks like you're lost.
            </h2>
            
            <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem; max-width: 500px; margin-left: auto; margin-right: auto;">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>

            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" class="btn" style="padding: 0.8rem 2rem; font-size: 1.05rem; display: flex; align-items: center; gap: 0.5rem; border-radius: 50px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 85, 255, 0.3);">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline" style="padding: 0.8rem 2rem; font-size: 1.05rem; display: flex; align-items: center; gap: 0.5rem; border-radius: 50px; border: 2px solid var(--border-color); color: var(--text-primary); transition: all 0.3s ease;">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
            </div>
            
            <!-- Optional: Tech touch or decorative element -->
            <div style="margin-top: 4rem; opacity: 0.5;">
                <i class="fas fa-satellite-dish" style="font-size: 3rem; color: var(--border-color); animation: pulse 2s infinite;"></i>
                <p style="font-family: monospace; font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">ERR_PAGE_NOT_FOUND</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" style="margin-top: auto;">
        <div class="container text-center">
            <p class="text-secondary text-sm">
                © 2026 Engineer Playbook. All rights reserved.
            </p>
        </div>
    </footer>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 85, 255, 0.4) !important;
        }
        
        .btn-outline:hover {
            border-color: var(--text-primary) !important;
            transform: translateY(-2px);
        }
    </style>

</body>

</html>
